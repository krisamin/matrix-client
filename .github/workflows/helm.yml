name: Helm

on:
  push:
    branches: [master]
    paths: ["charts/**"]
  pull_request:
    branches: [master]
    paths: ["charts/**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-and-template:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Helm lint
        run: helm lint charts/matrix-client

      - name: Helm template (dry-run render)
        run: |
          helm template demo charts/matrix-client \
            --set ingress.enabled=true \
            --set ingress.hosts[0].host=chat.example.com \
            --set ingress.hosts[0].paths[0].path=/ \
            --set ingress.hosts[0].paths[0].pathType=Prefix
