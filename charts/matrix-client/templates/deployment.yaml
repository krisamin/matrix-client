apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    {{- include "matrix-client.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "matrix-client.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "matrix-client.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: web
          image: {{ include "matrix-client.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
          # nginx needs writable /var/cache/nginx and /var/run with
          # readOnlyRootFilesystem=true — wire up emptyDirs.
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
          {{- if .Values.config.defaultHomeserver }}
          # Optional: rewrite the bundled homeserver default at startup.
          # Replaces the literal "https://matrix.org" placeholder in the
          # built JS bundle. Idempotent (sed only touches matching files).
          env:
            - name: DEFAULT_HOMESERVER
              value: {{ .Values.config.defaultHomeserver | quote }}
          lifecycle:
            postStart:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    if [ -n "${DEFAULT_HOMESERVER}" ]; then
                      find /usr/share/nginx/html/assets -name '*.js' -exec \
                        sed -i "s|https://matrix.org|${DEFAULT_HOMESERVER}|g" {} +
                    fi
          {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 1
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
