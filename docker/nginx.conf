server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Aggressive cache for hashed asset bundles.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback: any non-asset 404 reroutes to index.html so client-side
  # routing handles /room/:id, /verify, /oidc/callback, etc.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Service worker scope must match where it's served.
  location = /sw.js {
    add_header Cache-Control "no-cache";
    try_files $uri =404;
  }

  # Reasonable defaults
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;
}
